<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Hệ thống đang bảo trì | Locafy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="design-system.css">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        .animate-spin-reverse {
            animation: spin-reverse 8s linear infinite;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col justify-center items-center p-6 bg-gradient-to-tr from-stone-50 via-stone-100/50 to-stone-50">
    <div class="max-w-md w-full bg-white rounded-[32px] p-8 md:p-10 border border-stone-200/50 shadow-premium-xl text-center space-y-6">
        <!-- Logo -->
        <div class="flex items-center justify-center">
            <img src="images/docx/logo.png" alt="Locafy Logo" class="h-16 object-contain">
        </div>

        <!-- Animated Construction/Gear Icon -->
        <div class="relative w-32 h-32 mx-auto flex items-center justify-center">
            <div class="absolute w-24 h-24 rounded-full border-4 border-dashed border-teal-vibrant animate-spin opacity-60" style="animation-duration: 12s;"></div>
            <div class="absolute w-16 h-16 rounded-full border-4 border-dashed border-primary animate-spin-reverse opacity-80"></div>
            <div class="relative z-10 bg-white p-4 rounded-full shadow-premium-md border border-stone-100 text-primary">
                <span class="material-symbols-outlined text-[48px] animate-pulse">construction</span>
            </div>
        </div>

        <!-- Content -->
        <div class="space-y-3">
            <h1 class="text-2xl font-black text-primary tracking-tight">Hệ thống đang bảo trì</h1>
            <p class="text-sm text-stone-500 leading-relaxed">Chúng tôi đang tiến hành bảo trì định kỳ để cải thiện hiệu năng và bảo mật hệ thống. Vui lòng quay lại sau ít phút.</p>
        </div>

        <div class="w-full border-t border-stone-100 my-4"></div>

        <!-- Status Indicator / Time Estimate -->
        <div class="inline-flex items-center gap-2 bg-stone-50 border border-stone-150 px-4 py-2 rounded-full text-xs font-semibold text-stone-600 mx-auto">
            <span class="w-2 h-2 rounded-full bg-amber-500 animate-ping"></span>
            <span>Thời gian hoàn tất dự kiến: 30 phút</span>
        </div>
    </div>
</body>
</html>
