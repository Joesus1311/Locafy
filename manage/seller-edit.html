<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Environment Config & Dynamic Analytics -->
    <script src="../env.js"></script>
    <script src="../analytics.js" async></script>
    <title>Chỉnh sửa tin nhà bán - Locafy</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../design-system.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="max-w-5xl mx-auto px-4 py-10">
        <div class="mb-6 flex items-center justify-between">
            <a href="../index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-blue-700">
                <i class="fa-solid fa-arrow-left"></i>
                Về trang chủ
            </a>
            <div class="rounded-full bg-amber-100 px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] text-amber-700">Locafy Edit</div>
        </div>

        <div class="grid lg:grid-cols-[0.9fr_1.1fr] gap-6 items-start">
            <section class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6">
                <p class="text-xs font-bold uppercase tracking-[0.25em] text-amber-600">Chỉnh sửa tin</p>
                <h1 class="mt-3 text-3xl font-bold text-gray-900">Cập nhật thông tin nhà của bạn</h1>
                <p class="mt-3 text-sm text-gray-600 leading-relaxed">Bạn có thể thay đổi giá, mô tả, địa chỉ và ảnh của bài đăng đã tạo.</p>
            </section>

            <section class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6">
                <form id="edit-post-form" class="space-y-3">
                    <div>
                        <label for="title" class="block text-sm font-semibold text-gray-700">Tiêu đề tin đăng</label>
                        <input id="title" name="title" type="text" required class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label for="price" class="block text-sm font-semibold text-gray-700">Giá</label>
                        <input id="price" name="price" type="text" required class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label for="location" class="block text-sm font-semibold text-gray-700">Địa chỉ</label>
                        <input id="location" name="location" type="text" required class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label for="roomCount" class="block text-sm font-semibold text-gray-700">Số phòng</label>
                        <input id="roomCount" name="roomCount" type="text" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="area" class="block text-sm font-semibold text-gray-700">Diện tích (m²)</label>
                            <input id="area" name="area" type="number" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label for="depositPrice" class="block text-sm font-semibold text-gray-700">Tiền cọc (VNĐ)</label>
                            <input id="depositPrice" name="depositPrice" type="number" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="maxOccupants" class="block text-sm font-semibold text-gray-700">Số người tối đa</label>
                            <input id="maxOccupants" name="maxOccupants" type="number" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label for="electricPrice" class="block text-sm font-semibold text-gray-700">Tiền điện</label>
                            <input id="electricPrice" name="electricPrice" type="number" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="waterPrice" class="block text-sm font-semibold text-gray-700">Tiền nước</label>
                            <input id="waterPrice" name="waterPrice" type="number" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                        <div>
                            <label for="internetPrice" class="block text-sm font-semibold text-gray-700">Internet</label>
                            <input id="internetPrice" name="internetPrice" type="number" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                    <div>
                        <label for="parkingPrice" class="block text-sm font-semibold text-gray-700">Phí gửi xe</label>
                        <input id="parkingPrice" name="parkingPrice" type="number" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label for="layout" class="block text-sm font-semibold text-gray-700">Thông tin căn hộ</label>
                        <input id="layout" name="layout" type="text" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Tiện ích</label>
                        <div id="amenities-container" class="mt-1 rounded-xl border border-gray-200 p-2">
                            <div id="amenities-tags" class="flex flex-wrap gap-2"></div>
                            <input id="amenities-input" type="text" class="mt-2 w-full border-0 bg-transparent text-sm focus:outline-none" placeholder="Nhập tiện ích và nhấn Enter">
                        </div>
                        <input id="amenities" name="amenities" type="hidden">
                        <p class="mt-1 text-xs text-gray-500">Có thể thêm nhiều tiện ích khác nhau.</p>
                    </div>
                    <div>
                        <label for="image" class="block text-sm font-semibold text-gray-700">Ảnh mới</label>
                        <input id="image" name="image" type="file" accept="image/*" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                        <p class="mt-1 text-xs text-gray-500">Bỏ trống nếu không đổi ảnh.</p>
                    </div>
                    <div>
                        <label for="contact" class="block text-sm font-semibold text-gray-700">Số liên hệ</label>
                        <input id="contact" name="contact" type="text" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label for="description" class="block text-sm font-semibold text-gray-700">Mô tả</label>
                        <textarea id="description" name="description" rows="4" required class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                    </div>

                    <button type="submit" class="w-full rounded-xl bg-amber-600 px-3 py-2.5 text-sm font-bold text-white hover:bg-amber-700 transition">Lưu thay đổi</button>
                </form>

                <div id="edit-post-message" class="mt-4 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-700">
                    Thông tin bài đăng sẽ được cập nhật ngay.
                </div>
            </section>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const listingId = params.get('id');
        const listingsKey = 'locafySellerListings';
        const form = document.getElementById('edit-post-form');
        const message = document.getElementById('edit-post-message');

        function showMessage(text, tone = 'info') {
            message.textContent = text;
            message.className = 'mt-4 rounded-2xl px-4 py-3 text-sm border';
            message.classList.remove('bg-green-50', 'border-green-200', 'text-green-800', 'bg-red-50', 'border-red-200', 'text-red-700', 'bg-gray-50', 'border-gray-200', 'text-gray-700');
            if (tone === 'success') {
                message.classList.add('bg-green-50', 'border-green-200', 'text-green-800');
            } else if (tone === 'error') {
                message.classList.add('bg-red-50', 'border-red-200', 'text-red-700');
            } else {
                message.classList.add('bg-gray-50', 'border-gray-200', 'text-gray-700');
            }
        }

        async function getListings() {
            if (window.db) {
                return await window.db.getListings();
            }
            try {
                return JSON.parse(localStorage.getItem(listingsKey)) || [];
            } catch (error) {
                return [];
            }
        }

        function saveListings(listings) {
            localStorage.setItem(listingsKey, JSON.stringify(listings));
        }

        const currentUser = JSON.parse(localStorage.getItem('locafyCurrentUser') || 'null');
        if (!currentUser) {
            showMessage('Bạn cần đăng nhập để sử dụng trang này. Đang chuyển hướng đến trang đăng nhập...', 'error');
            setTimeout(() => {
                window.location.href = `../login.html?redirect=${encodeURIComponent(window.location.href)}`;
            }, 1200);
        } else if (currentUser.role !== 'seller') {
            showUpgradeOverlay();
        }

        function showUpgradeOverlay() {
            const overlay = document.createElement('div');
            overlay.id = 'role-upgrade-overlay';
            overlay.className = 'fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4';
            
            overlay.innerHTML = `
                <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-md w-full shadow-2xl border border-slate-100 text-center transform scale-100 transition-all duration-300">
                    <div class="bg-amber-50 text-amber-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                        <i class="fa-solid fa-house-chimney-user text-2xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900">Yêu cầu tài khoản Chủ nhà</h3>
                    <p class="text-sm text-gray-600 mt-3 leading-relaxed">
                        Tài khoản hiện tại của bạn (<span class="font-bold text-gray-800">${currentUser.name}</span>) đang ở vai trò <strong>Người thuê / Người mua</strong>.
                    </p>
                    <p class="text-sm text-gray-600 mt-2 leading-relaxed">
                        Để chỉnh sửa tin đăng, bạn cần nâng cấp tài khoản của mình lên vai trò <strong>Chủ nhà / Người bán</strong>.
                    </p>
                    
                    <div class="mt-6 space-y-3">
                        <button onclick="upgradeRole()" class="w-full text-center bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-circle-arrow-up"></i> Nâng cấp lên Chủ nhà ngay
                        </button>
                        <a href="../index.html" class="block w-full text-center bg-gray-50 hover:bg-gray-100 text-gray-700 border border-gray-200 font-semibold py-3 px-4 rounded-xl transition duration-200">
                            Quay lại Trang chủ
                        </a>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        window.upgradeRole = async function() {
            if (!currentUser) return;
            currentUser.role = 'seller';
            localStorage.setItem('locafyCurrentUser', JSON.stringify(currentUser));
            
            try {
                if (window.db) {
                    const accounts = await window.db.getAccounts();
                    const acc = accounts.find(a => a.username.toLowerCase() === currentUser.username.toLowerCase() || a.email.toLowerCase() === currentUser.email.toLowerCase());
                    if (acc) {
                        acc.role = 'seller';
                        await window.db.saveAccount(acc);
                    } else {
                        await window.db.saveAccount(currentUser);
                    }
                } else {
                    const accounts = JSON.parse(localStorage.getItem('locafyAccounts')) || [];
                    const updatedAccounts = accounts.map(acc => {
                        if (acc.username.toLowerCase() === currentUser.username.toLowerCase() || acc.email.toLowerCase() === currentUser.email.toLowerCase()) {
                            acc.role = 'seller';
                        }
                        return acc;
                    });
                    localStorage.setItem('locafyAccounts', JSON.stringify(updatedAccounts));
                }
            } catch (e) {
                console.error(e);
            }
            
            const card = document.querySelector('#role-upgrade-overlay .bg-white');
            if (card) {
                card.innerHTML = `
                    <div class="bg-emerald-50 text-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner animate-bounce">
                        <i class="fa-solid fa-circle-check text-2xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900">Nâng cấp thành công!</h3>
                    <p class="text-sm text-gray-650 mt-3 leading-relaxed">
                        Tài khoản của bạn đã được nâng cấp lên <strong>Chủ nhà trọ (Seller)</strong>.
                    </p>
                    <p class="text-sm text-emerald-700 font-semibold mt-2">
                        Đang làm mới trang...
                    </p>
                `;
            }
            
            setTimeout(() => {
                window.location.reload();
            }, 1200);
        };


        let listings = [];
        let listing = null;
        let amenities = [];

        const amenitiesInput = document.getElementById('amenities-input');
        const amenitiesHidden = document.getElementById('amenities');
        const amenitiesTags = document.getElementById('amenities-tags');

        async function init() {
            let attempts = 0;
            while (!window.db && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            listings = await getListings();
            listing = listings.find((item) => item.id === listingId);
            if (!listing) {
                showMessage('Không tìm thấy tin đăng để chỉnh sửa.', 'error');
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1200);
                return;
            }

            document.getElementById('title').value = listing?.title || '';
            document.getElementById('price').value = listing?.price || '';
            document.getElementById('location').value = listing?.location || '';
            document.getElementById('roomCount').value = listing?.roomCount || '';
            document.getElementById('layout').value = listing?.layout || '';
            document.getElementById('contact').value = listing?.contact || '';
            document.getElementById('description').value = listing?.description || '';
            document.getElementById('area').value = (listing?.area || '').toString().replace(/ m[²2]/g, '').trim();
            document.getElementById('depositPrice').value = listing?.depositPrice || '';
            document.getElementById('maxOccupants').value = listing?.maxOccupants || '';
            document.getElementById('electricPrice').value = listing?.electricPrice || '';
            document.getElementById('waterPrice').value = listing?.waterPrice || '';
            document.getElementById('internetPrice').value = listing?.internetPrice || '';
            document.getElementById('parkingPrice').value = listing?.parkingPrice || '';

            amenities = (listing?.amenities || '').split(',').map((item) => item.trim()).filter(Boolean);
            renderAmenities();
        }
        init();

        function renderAmenities() {
            amenitiesTags.innerHTML = '';
            amenities.forEach((item) => {
                const tag = document.createElement('span');
                tag.className = 'inline-flex items-center gap-1 rounded-full bg-amber-50 px-2.5 py-1 text-xs font-semibold text-amber-700';
                tag.innerHTML = `${item}<button type="button" class="ml-1 text-amber-800" data-remove-amenity="${item}">&times;</button>`;
                amenitiesTags.appendChild(tag);
            });
            amenitiesHidden.value = amenities.join(', ');
        }

        amenitiesInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                const value = amenitiesInput.value.trim();
                if (value) {
                    amenities = [...new Set([...amenities, value])];
                    amenitiesInput.value = '';
                    renderAmenities();
                }
            }
        });

        amenitiesTags.addEventListener('click', (event) => {
            const removeButton = event.target.closest('[data-remove-amenity]');
            if (!removeButton) return;
            const value = removeButton.getAttribute('data-remove-amenity');
            amenities = amenities.filter((item) => item !== value);
            renderAmenities();
        });

        renderAmenities();

        function compressImage(file, maxWidth = 800, maxHeight = 600, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    img.onerror = () => {
                        resolve(event.target.result);
                    };
                };
                reader.onerror = () => {
                    resolve('');
                };
            });
        }

        // Chuẩn hóa giá nhập về số VND (đơn vị chuẩn của hệ thống).
        function parsePriceInputToVND(input) {
            if (input == null) return 0;
            const s = String(input).toLowerCase().trim();
            const isTrieu = /tri|tr\b|m\b/.test(s);
            const numPart = s.replace(/[^0-9.,]/g, '');
            if (!numPart) return 0;
            let value;
            if (/^\d{1,3}([.,]\d{3})+$/.test(numPart)) {
                value = parseFloat(numPart.replace(/[.,]/g, ''));
            } else {
                value = parseFloat(numPart.replace(',', '.')) || 0;
            }
            if (isTrieu || value < 1000) value = value * 1e6;
            return Math.round(value);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!listing) return;

            const formData = new FormData(form);
            const imageFile = formData.get('image');
            let imageDataUrl = listing.image || '';

            if (imageFile && imageFile.name) {
                imageDataUrl = await compressImage(imageFile, 800, 600, 0.7);
            }

            const updatedListing = {
                ...listing,
                title: formData.get('title').trim(),
                price: parsePriceInputToVND(formData.get('price')),
                location: formData.get('location').trim(),
                roomCount: formData.get('roomCount').trim(),
                layout: formData.get('layout').trim(),
                amenities: amenitiesHidden.value.trim(),
                image: imageDataUrl,
                contact: formData.get('contact').trim(),
                description: formData.get('description').trim(),
                area: formData.get('area') ? formData.get('area').trim() : '0',
                depositPrice: formData.get('depositPrice') ? parseFloat(formData.get('depositPrice')) : 0,
                electricPrice: formData.get('electricPrice') ? parseFloat(formData.get('electricPrice')) : 0,
                waterPrice: formData.get('waterPrice') ? parseFloat(formData.get('waterPrice')) : 0,
                internetPrice: formData.get('internetPrice') ? parseFloat(formData.get('internetPrice')) : 0,
                parkingPrice: formData.get('parkingPrice') ? parseFloat(formData.get('parkingPrice')) : 0,
                maxOccupants: formData.get('maxOccupants') ? parseInt(formData.get('maxOccupants')) : 1,
            };

            if (window.db) {
                await window.db.saveListing(updatedListing);
            } else {
                const updatedListings = listings.map((item) => (item.id === listingId ? updatedListing : item));
                saveListings(updatedListings);
            }
            showMessage('Cập nhật tin thành công!', 'success');
            setTimeout(() => {
                window.location.href = 'room-management.html';
            }, 800);
        });
    </script>
</body>
</html>
