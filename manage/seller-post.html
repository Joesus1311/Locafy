<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Environment Config & Dynamic Analytics -->
    <script src="../env.js"></script>
    <script src="../analytics.js" async></script>
    <title>Đăng tin nhà bán - Locafy</title>
    <link rel="stylesheet" href="../design-system.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../design-system.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="max-w-5xl mx-auto px-4 py-10">
        <div class="mb-6 flex items-center justify-between">
            <a href="../index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-blue-700">
                <i class="fa-solid fa-arrow-left"></i>
                Về trang chủ
            </a>
            <div class="rounded-full bg-blue-100 px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] text-blue-700">Locafy Seller</div>
        </div>

        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-900">Tạo tin đăng nhà của bạn</h1>
        </div>

        <!-- FORM WRAPPER -->
        <form id="seller-post-form" class="grid lg:grid-cols-2 gap-6 items-start">
            
            <!-- LEFT COLUMN -->
            <div class="space-y-6">
                        
                        <!-- CARD 1: Liên kết Nhà & Phòng -->
                        <div class="bg-white rounded-3xl border border-blue-100 shadow-sm p-6 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="bg-blue-100 p-1.5 rounded-lg text-blue-600"><i class="fa-solid fa-house"></i></div>
                                <h3 class="font-bold text-gray-900">Liên kết Nhà & Phòng</h3>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">CHỌN NHÀ TRỌ / TÒA NHÀ *</label>
                                    <select class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                        <option>-- Chọn Nhà trọ --</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">CHỌN PHÒNG *</label>
                                    <select class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                        <option>-- Chọn Phòng --</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- CARD 2: Thông tin cơ bản tin đăng -->
                        <div class="bg-white rounded-3xl border border-blue-100 shadow-sm p-6 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="bg-blue-100 p-1.5 rounded-lg text-blue-600"><i class="fa-solid fa-circle-info"></i></div>
                                <h3 class="font-bold text-gray-900">Thông tin cơ bản tin đăng</h3>
                            </div>
                            
                            <div class="space-y-4">
                                <div>
                                    <label for="title" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">TÊN HIỂN THỊ / TIÊU ĐỀ TIN ĐĂNG *</label>
                                    <input id="title" name="title" type="text" required class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Căn hộ Studio cao cấp đầy đủ tiện nghi...">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label for="layout" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">LOẠI HÌNH PHÒNG</label>
                                        <select id="layout" name="layout" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                            <option value="Phòng đơn / Khép kín">Phòng đơn / Khép kín</option>
                                            <option value="Căn hộ Studio">Căn hộ Studio</option>
                                            <option value="Nhà nguyên căn">Nhà nguyên căn</option>
                                            <option value="Phòng trọ giá rẻ">Phòng trọ giá rẻ</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label for="price" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">GIÁ THUÊ (VNĐ/THÁNG) *</label>
                                        <input id="price" name="price" type="text" required class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="5500000">
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label for="area" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">DIỆN TÍCH (M²) *</label>
                                        <input id="area" name="area" type="number" required class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="25">
                                    </div>
                                    <div>
                                        <label for="contact" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">SỐ ĐIỆN THOẠI LIÊN HỆ</label>
                                        <input id="contact" name="contact" type="text" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0901234567">
                                    </div>
                                </div>
                                <div>
                                    <label for="location" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">ĐỊA CHỈ CHI TIẾT (TỰ NHẬP HOẶC PREFILL) *</label>
                                    <input id="location" name="location" type="text" required class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="Hòa Lạc, Thạch Thất, Hà Nội">
                                </div>
                            </div>
                        </div>

                        <!-- CARD 3: Chi phí hàng tháng & Cọc -->
                        <div class="bg-white rounded-3xl border border-blue-100 shadow-sm p-6 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="bg-blue-100 p-1.5 rounded-lg text-blue-600"><i class="fa-solid fa-coins"></i></div>
                                <h3 class="font-bold text-gray-900">Chi phí hàng tháng & Yêu cầu</h3>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label for="depositPrice" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">TIỀN CỌC (VNĐ)</label>
                                    <input id="depositPrice" name="depositPrice" type="number" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: 5500000">
                                </div>
                                <div>
                                    <label for="maxOccupants" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">SỐ NGƯỜI TỐI ĐA</label>
                                    <input id="maxOccupants" name="maxOccupants" type="number" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: 2">
                                </div>
                                <div>
                                    <label for="electricPrice" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">TIỀN ĐIỆN (VNĐ/KWH)</label>
                                    <input id="electricPrice" name="electricPrice" type="number" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: 3500">
                                </div>
                                <div>
                                    <label for="waterPrice" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">TIỀN NƯỚC (VNĐ/M3 HOẶC NGƯỜI)</label>
                                    <input id="waterPrice" name="waterPrice" type="number" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: 100000">
                                </div>
                                <div>
                                    <label for="internetPrice" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">PHÍ INTERNET (VNĐ/THÁNG)</label>
                                    <input id="internetPrice" name="internetPrice" type="number" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: 100000">
                                </div>
                                <div>
                                    <label for="parkingPrice" class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">PHÍ GỬI XE (VNĐ/THÁNG)</label>
                                    <input id="parkingPrice" name="parkingPrice" type="number" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: 100000">
                                </div>
                            </div>
                        </div>

                        <!-- CARD 4: Mô tả chi tiết -->
                        <div class="bg-white rounded-3xl border border-blue-100 shadow-sm p-6 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="bg-blue-100 p-1.5 rounded-lg text-blue-600"><i class="fa-solid fa-align-left"></i></div>
                                <h3 class="font-bold text-gray-900">Mô tả chi tiết</h3>
                            </div>
                            <textarea id="description" name="description" rows="5" required class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="Mô tả nội thất, tiện nghi, giờ giấc, camera an ninh..."></textarea>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN -->
                    <div class="space-y-6">
                        
                        <!-- CARD 5: Hình ảnh tin đăng -->
                        <div class="bg-white rounded-3xl border border-blue-100 shadow-sm p-6 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="bg-blue-100 p-1.5 rounded-lg text-blue-600"><i class="fa-solid fa-image"></i></div>
                                <h3 class="font-bold text-gray-900">Hình ảnh tin đăng</h3>
                            </div>
                            
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">TẢI ẢNH LÊN (CHỌN NHIỀU ẢNH)</label>
                            <input id="image" name="image" type="file" accept="image/*" class="w-full mb-4 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                            
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">HOẶC THÊM ẢNH BẰNG URL LIÊN KẾT</label>
                            <div class="flex gap-2">
                                <input type="url" id="imageUrl" class="flex-1 rounded-xl border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://images.unsplash.com/...">
                                <button type="button" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:opacity-90">Thêm</button>
                            </div>
                        </div>

                        <!-- CARD 6: Tiện ích tích hợp -->
                        <div class="bg-white rounded-3xl border border-blue-100 shadow-sm p-6 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                            <div class="flex items-center gap-2 mb-4">
                                <div class="bg-blue-100 p-1.5 rounded-lg text-blue-600"><i class="fa-solid fa-check-circle"></i></div>
                                <h3 class="font-bold text-gray-900">Tiện ích tích hợp</h3>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3" id="amenities-checkbox-group">
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Máy lạnh" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Máy lạnh</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Wifi Free" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Wifi Free</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Chỗ để xe" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Chỗ để xe</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Máy giặt" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Máy giặt</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Tủ lạnh" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Tủ lạnh</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Nóng lạnh" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Nóng lạnh</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Ban công" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Ban công</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Thang máy" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Thang máy</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="An ninh 24/7" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">An ninh 24/7</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Khóa vân tay" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Khóa vân tay</span>
                                </label>
                                <label class="flex items-center gap-3 border border-gray-100 rounded-xl p-3 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="checkbox" value="Kệ bếp" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                    <span class="text-sm text-gray-700">Kệ bếp</span>
                                </label>

                        </div>

                        <!-- SUBMIT BUTTON -->
                        <div class="pt-4">
                            <button type="submit" class="w-full rounded-2xl bg-blue-600 px-4 py-4 text-lg font-bold text-white hover:bg-blue-800 transition shadow-lg shadow-blue-900/20">LƯU TIN ĐĂNG</button>
                        </div>
                    </div>
        </form>

        <div id="seller-post-message" class="hidden mt-4 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-700"></div>
    </div>

    <script>
        const currentUserKey = 'locafyCurrentUser';
        const sellerListingsKey = 'locafySellerListings';
        const form = document.getElementById('seller-post-form');
        const message = document.getElementById('seller-post-message');

        function getCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem(currentUserKey));
            } catch (error) {
                return null;
            }
        }

        function showMessage(text, tone = 'info') {
            message.textContent = text;
            message.className = 'mt-4 rounded-2xl px-4 py-3 text-sm border';
            message.classList.remove('bg-green-50', 'border-green-200', 'text-green-800', 'bg-red-50', 'border-red-200', 'text-red-700', 'bg-gray-50', 'border-gray-200', 'text-gray-700');
            if (tone === 'success') {
                message.classList.add('bg-green-50', 'border-green-200', 'text-green-800');
            } else if (tone === 'error') {
                message.classList.add('bg-red-50', 'border-red-200', 'text-red-700');
            } else {
                message.classList.add('bg-gray-50', 'border-gray-200', 'text-gray-700');
            }
        }

        const currentUser = getCurrentUser();
        if (!currentUser) {
            showMessage('Bạn cần đăng nhập để sử dụng trang này. Đang chuyển hướng đến trang đăng nhập...', 'error');
            setTimeout(() => {
                window.location.href = '../login.html?redirect=manage/seller-post.html';
            }, 1200);
        } else if (currentUser.role !== 'seller') {
            showUpgradeOverlay();
        }

        function showUpgradeOverlay() {
            const overlay = document.createElement('div');
            overlay.id = 'role-upgrade-overlay';
            overlay.className = 'fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4';
            
            overlay.innerHTML = `
                <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-md w-full shadow-2xl border border-slate-100 text-center transform scale-100 transition-all duration-300">
                    <div class="bg-amber-50 text-amber-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                        <i class="fa-solid fa-house-chimney-user text-2xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900">Yêu cầu tài khoản Chủ nhà</h3>
                    <p class="text-sm text-gray-600 mt-3 leading-relaxed">
                        Tài khoản hiện tại của bạn (<span class="font-bold text-gray-800">${currentUser.name}</span>) đang ở vai trò <strong>Người thuê / Người mua</strong>.
                    </p>
                    <p class="text-sm text-gray-600 mt-2 leading-relaxed">
                        Để đăng tin cho thuê phòng, bạn cần nâng cấp tài khoản của mình lên vai trò <strong>Chủ nhà / Người bán</strong>.
                    </p>
                    
                    <div class="mt-6 space-y-3">
                        <button onclick="upgradeRole()" class="w-full text-center bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-circle-arrow-up"></i> Nâng cấp lên Chủ nhà ngay
                        </button>
                        <a href="../index.html" class="block w-full text-center bg-gray-50 hover:bg-gray-100 text-gray-700 border border-gray-200 font-semibold py-3 px-4 rounded-xl transition duration-200">
                            Quay lại Trang chủ
                        </a>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        window.upgradeRole = async function() {
            if (!currentUser) return;
            currentUser.role = 'seller';
            localStorage.setItem(currentUserKey, JSON.stringify(currentUser));
            
            try {
                if (window.db) {
                    const accounts = await window.db.getAccounts();
                    const acc = accounts.find(a => a.username.toLowerCase() === currentUser.username.toLowerCase() || a.email.toLowerCase() === currentUser.email.toLowerCase());
                    if (acc) {
                        acc.role = 'seller';
                        await window.db.saveAccount(acc);
                    } else {
                        await window.db.saveAccount(currentUser);
                    }
                } else {
                    const accounts = JSON.parse(localStorage.getItem('locafyAccounts')) || [];
                    const updatedAccounts = accounts.map(acc => {
                        if (acc.username.toLowerCase() === currentUser.username.toLowerCase() || acc.email.toLowerCase() === currentUser.email.toLowerCase()) {
                            acc.role = 'seller';
                        }
                        return acc;
                    });
                    localStorage.setItem('locafyAccounts', JSON.stringify(updatedAccounts));
                }
            } catch (e) {
                console.error(e);
            }
            
            const card = document.querySelector('#role-upgrade-overlay .bg-white');
            if (card) {
                card.innerHTML = `
                    <div class="bg-emerald-50 text-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner animate-bounce">
                        <i class="fa-solid fa-circle-check text-2xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-900">Nâng cấp thành công!</h3>
                    <p class="text-sm text-gray-650 mt-3 leading-relaxed">
                        Tài khoản của bạn đã được nâng cấp lên <strong>Chủ nhà trọ (Seller)</strong>.
                    </p>
                    <p class="text-sm text-emerald-700 font-semibold mt-2">
                        Đang làm mới trang...
                    </p>
                `;
            }
            
            setTimeout(() => {
                window.location.reload();
            }, 1200);
        };


        function getSelectedAmenities() {
            const checkboxes = document.querySelectorAll('#amenities-checkbox-group input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function compressImage(file, maxWidth = 800, maxHeight = 600, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(compressedDataUrl);
                    };
                    img.onerror = () => {
                        resolve(event.target.result);
                    };
                };
                reader.onerror = () => {
                    resolve('');
                };
            });
        }

        // Chuẩn hóa giá nhập về số VND (đơn vị chuẩn của hệ thống).
        // Hỗ trợ: "3000000", "3.000.000", "3,2 triệu", "3.5" (hiểu là 3.5 triệu)...
        function parsePriceInputToVND(input) {
            if (input == null) return 0;
            const s = String(input).toLowerCase().trim();
            const isTrieu = /tri|tr\b|m\b/.test(s);
            const numPart = s.replace(/[^0-9.,]/g, '');
            if (!numPart) return 0;
            let value;
            if (/^\d{1,3}([.,]\d{3})+$/.test(numPart)) {
                value = parseFloat(numPart.replace(/[.,]/g, '')); // dấu phân tách hàng nghìn
            } else {
                value = parseFloat(numPart.replace(',', '.')) || 0;
            }
            if (isTrieu || value < 1000) value = value * 1e6; // người dùng nhập theo "triệu"
            return Math.round(value);
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(form);
            const imageFile = formData.get('image');
            let imageDataUrl = '';

            if (imageFile && imageFile.name) {
                imageDataUrl = await compressImage(imageFile, 800, 600, 0.7);
            }

            const listing = {
                id: `seller-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                title: formData.get('title').trim(),
                price: parsePriceInputToVND(formData.get('price')),
                location: formData.get('location').trim(),
                area: formData.get('area') ? formData.get('area').trim() : '0',
                depositPrice: formData.get('depositPrice') ? parseFloat(formData.get('depositPrice')) : 0,
                electricPrice: formData.get('electricPrice') ? parseFloat(formData.get('electricPrice')) : 0,
                waterPrice: formData.get('waterPrice') ? parseFloat(formData.get('waterPrice')) : 0,
                internetPrice: formData.get('internetPrice') ? parseFloat(formData.get('internetPrice')) : 0,
                parkingPrice: formData.get('parkingPrice') ? parseFloat(formData.get('parkingPrice')) : 0,
                maxOccupants: formData.get('maxOccupants') ? parseInt(formData.get('maxOccupants')) : 1,
                roomCount: formData.get('layout') || '1 phòng',
                layout: formData.get('layout').trim(),
                amenities: getSelectedAmenities().join(', '),
                image: imageDataUrl,
                contact: formData.get('contact').trim(),
                description: formData.get('description').trim(),
                ownerUsername: currentUser ? currentUser.username : '',
                censored: true,
                status: 'approved',
                rented: false,
                createdAt: new Date().toISOString()
            };

            if (window.db) {
                await window.db.saveListing(listing);
            } else {
                const listings = JSON.parse(localStorage.getItem(sellerListingsKey) || '[]');
                listings.unshift(listing);
                localStorage.setItem(sellerListingsKey, JSON.stringify(listings));
            }
            form.reset();
            showMessage('Đăng tin thành công! Tin của bạn đã được gửi cho Quản trị viên kiểm duyệt.', 'success');
            setTimeout(() => {
                window.location.href = 'room-management.html';
            }, 1000);
        });
    </script>
</body>
